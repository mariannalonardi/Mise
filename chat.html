<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI Trainabile</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
        }
        .app-container {
            display: grid;
            grid-template-columns: 1fr 430px;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }
        .config-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 20px;
            background: #8a9370;
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-bottom: 2px solid #7a8360;
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        .form-sublabel {
            font-size: 12px;
            color: #666;
            margin-top: -4px;
        }
        textarea, input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #8a9370;
        }
        .textarea-large {
            min-height: 100px;
        }
        .textarea-small {
            min-height: 50px;
        }
        button {
            padding: 10px 14px;
            background: #6b7456;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }
        button:hover {
            background: #5a6345;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .separator {
            border-top: 2px solid #e0e0e0;
            padding-top: 15px;
            margin-top: 15px;
        }
        .examples-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .example-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
        }
        .example-box strong {
            color: #6b7456;
        }
        .example-box .remove-btn {
            background: none;
            color: #ef4444;
            border: none;
            padding: 0;
            cursor: pointer;
            font-size: 11px;
            margin-top: 6px;
            font-weight: 600;
        }
        /* Phone Chat Styles */
        .phone-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #a8b48f;
            border-radius: 8px;
            overflow: hidden;
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #a8b48f;
            color: black;
            font-size: 12px;
            font-weight: 500;
        }
        .status-bar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: between;
            padding: 12px 16px;
            background: #8a9370;
            border-bottom: 1px solid #7a8360;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #a8b48f;
        }
        .message {
            display: flex;
            font-size: 13px;
            line-height: 1.3;
        }
        .message.user {
            justify-content: flex-end;
        }
        .message.assistant {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.user .message-bubble {
            background: white;
            color: black;
            border-radius: 18px 18px 4px 18px;
        }
        .message.assistant .message-bubble {
            background: #6b7456;
            color: white;
            border-radius: 18px 18px 18px 4px;
        }
        .input-area {
            padding: 10px 12px;
            background: #a8b48f;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .input-area input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 20px;
            background: white;
            font-size: 13px;
        }
        .send-btn {
            background: #6b7456;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #5a6345;
        }
        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }
        .loading-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        @media (max-width: 1100px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function ChatApp() {
            const [systemPrompt, setSystemPrompt] = useState(
                "Sei un assistente AI addestrato dall'utente. Rispondi in base al prompt di sistema e agli esempi di training forniti."
            );
            const [examples, setExamples] = useState([]);
            const [exampleInput, setExampleInput] = useState("");
            const [exampleOutput, setExampleOutput] = useState("");
            const [messages, setMessages] = useState([
                {
                    id: "init",
                    role: "assistant",
                    content: "Ciao! Scrivi qui e ti risponderò secondo il prompt di sistema.",
                    timestamp: new Date()
                }
            ]);
            const [inputValue, setInputValue] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const addExample = () => {
                if (!exampleInput.trim() || !exampleOutput.trim()) return;
                setExamples([
                    ...examples,
                    {
                        id: Date.now(),
                        input: exampleInput,
                        output: exampleOutput
                    }
                ]);
                setExampleInput("");
                setExampleOutput("");
            };

            const removeExample = (id) => {
                setExamples(examples.filter(ex => ex.id !== id));
            };

            const generateResponse = (userMessage) => {
                let response = `Risposta basata su:\n📝 "${systemPrompt.substring(0, 50)}..."\n💬 "${userMessage.substring(0, 40)}..."`;
                
                if (examples.length > 0) {
                    const randomExample = examples[Math.floor(Math.random() * examples.length)];
                    response = `${randomExample.output}`;
                }
                
                return response;
            };

            const handleSendMessage = async () => {
                if (!inputValue.trim() || isLoading) return;

                const userMessage = {
                    id: Date.now().toString(),
                    role: "user",
                    content: inputValue,
                    timestamp: new Date()
                };

                setMessages(prev => [...prev, userMessage]);
                setInputValue("");
                setIsLoading(true);

                setTimeout(() => {
                    const response = generateResponse(inputValue);
                    const assistantMessage = {
                        id: (Date.now() + 1).toString(),
                        role: "assistant",
                        content: response,
                        timestamp: new Date()
                    };
                    setMessages(prev => [...prev, assistantMessage]);
                    setIsLoading(false);
                }, 600);
            };

            const handleKeyPress = (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const getCurrentTime = () => {
                return new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
            };

            return (
                <div className="app-container">
                    {/* Configuration Panel */}
                    <div className="config-panel">
                        <div className="panel-header">⚙️ Configurazione AI</div>
                        <div className="panel-content">
                            <div className="form-group">
                                <label className="form-label">System Prompt</label>
                                <p className="form-sublabel">Definisce il comportamento dell'AI</p>
                                <textarea
                                    className="textarea-large"
                                    value={systemPrompt}
                                    onChange={(e) => setSystemPrompt(e.target.value)}
                                    placeholder="Scrivi il prompt di sistema..."
                                />
                            </div>

                            <div className="separator">
                                <div className="form-group">
                                    <label className="form-label">Addestra l'AI</label>
                                    <p className="form-sublabel">Aggiungi esempi input/output</p>
                                </div>

                                <div className="form-group">
                                    <label className="form-label" style={{ fontSize: "12px" }}>Cosa scrive l'utente</label>
                                    <textarea
                                        className="textarea-small"
                                        value={exampleInput}
                                        onChange={(e) => setExampleInput(e.target.value)}
                                        placeholder="es. Ciao!"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label" style={{ fontSize: "12px" }}>Come deve rispondere l'AI</label>
                                    <textarea
                                        className="textarea-small"
                                        value={exampleOutput}
                                        onChange={(e) => setExampleOutput(e.target.value)}
                                        placeholder="es. Ciao! Come stai?"
                                    />
                                </div>

                                <button 
                                    onClick={addExample}
                                    disabled={!exampleInput.trim() || !exampleOutput.trim()}
                                >
                                    ➕ Aggiungi Esempio
                                </button>
                            </div>

                            {examples.length > 0 && (
                                <div className="separator">
                                    <div className="form-label" style={{ marginBottom: "10px" }}>
                                        ✅ {examples.length} Esempio{examples.length !== 1 ? 'i' : ''} Attivo{examples.length !== 1 ? 'i' : ''}
                                    </div>
                                    <div className="examples-list">
                                        {examples.map((ex) => (
                                            <div key={ex.id} className="example-box">
                                                <div><strong>In:</strong> {ex.input}</div>
                                                <div><strong>Out:</strong> {ex.output}</div>
                                                <button 
                                                    className="remove-btn"
                                                    onClick={() => removeExample(ex.id)}
                                                >
                                                    🗑️ Rimuovi
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Chat Phone */}
                    <div className="phone-wrapper">
                        <div className="chat-container">
                            {/* Status Bar */}
                            <div className="status-bar">
                                <span>{getCurrentTime()}</span>
                                <div className="status-bar-right">
                                    <span>📶</span>
                                    <span>🔋</span>
                                </div>
                            </div>

                            {/* Chat Header */}
                            <div className="chat-header">
                                AI Chat
                            </div>

                            {/* Messages */}
                            <div className="messages-area">
                                {messages.map((msg) => (
                                    <div key={msg.id} className={`message ${msg.role}`}>
                                        <div className="message-bubble">
                                            {msg.content}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="message assistant">
                                        <div className="message-bubble">
                                            <div className="loading-dots">
                                                <div className="loading-dot"></div>
                                                <div className="loading-dot"></div>
                                                <div className="loading-dot"></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </div>

                            {/* Input Area */}
                            <div className="input-area">
                                <input
                                    type="text"
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                    placeholder="Scrivi qui..."
                                    disabled={isLoading}
                                />
                                <button 
                                    className="send-btn"
                                    onClick={handleSendMessage}
                                    disabled={!inputValue.trim() || isLoading}
                                    title="Invia"
                                >
                                    ➤
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<ChatApp />);
    </script>
</body>
</html>
